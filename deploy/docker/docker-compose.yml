# docker/docker-compose.yml
services:
  app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    command: >
      gunicorn -k uvicorn.workers.UvicornWorker
               -w 2
               -b 0.0.0.0:8000
               src.api:app
    ports:
      - "8000:8000"
    environment:
      - QDRANT_PATH=/qdrant_data
      - COLLECTION_NAME=code_chunks
      - EMBEDDING_MODEL=BAAI/bge-m3
      - MODEL_CACHE_DIR=./model_cache
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=False
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant_storage
  
  postgres:
    image: postgres:16
    enviorment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=appdb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 3s
      retries 20
  
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  qdrant_data:
    driver: local
  pg_data:
    driver: local
  redis_data:
    driver: local
